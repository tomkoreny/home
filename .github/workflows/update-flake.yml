name: Update flake inputs

on:
  schedule:
    - cron: '0 4 * * *'  # Daily 4am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Update flake.lock
        run: nix flake update

      # Never push a lock that doesn't evaluate — every machine's
      # auto-upgrade would pull it. Determinate Nix lazy trees can leave
      # virtual source paths unmaterialized during flake checks.
      - name: Validate
        run: nix flake check --no-build --no-lazy-trees

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet flake.lock; then
            echo "No changes to flake.lock"
          else
            git add flake.lock
            git commit -m "flake.lock: daily update"
            git push
          fi
