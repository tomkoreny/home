name: Update flake inputs

on:
  schedule:
    - cron: '0 4 * * *'  # Daily 4am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7

      - name: Update flake.lock
        run: nix flake update

      # Never push a lock that doesn't evaluate — every machine's
      # auto-upgrade would pull it.
      - name: Validate
        run: nix flake check path:. --no-build

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet flake.lock; then
            echo "No changes to flake.lock"
          else
            git add flake.lock
            git commit -m "flake.lock: daily update"
            git push
          fi
